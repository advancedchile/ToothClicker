<head>

<style>
  @font-face {
    font-family: 'PixelifySans';
    src: url('uploads/PixelifySans-Regular-4835fe7f.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {

  @font-face {

    font-weight: 600;

  @font-face {

    src: url('uploads/PixelifySans-Bold-7da4a657.ttf') format('truetype');
    font-weight: 700;
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; font-family: 'PixelifySans', monospace !important; }
  .fa::before, .fas::before, .far::before, .fal::before, .fab::before,
  [class^="fa-"]::before, [class*=" fa-"]::before {
    font-family: "Font Awesome 6 Free" !important;
  }
  .fab::before, [class^="fa-brands"]::before { font-family: "Font Awesome 6 Brands" !important; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  #root { min-height: 100vh; }

  /* Responsive: collapse to single column on small screens */
  @media (max-width: 900px) {
    .gate-hero-wrap { grid-template-columns: 1fr !important; }
    .gate-hero { display: none !important; }
  }

  /* Animations */
  @keyframes floatUp {
    0%   { opacity: 1; transform: translate(-50%, -50%); }
    100% { opacity: 0; transform: translate(-50%, calc(-50% - 60px)); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }
  @keyframes goldFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
    50%       { transform: translate(-50%, -50%) translateY(-10px); }
  }
  @keyframes goldSpin {
    0%   { filter: drop-shadow(0 0 8px #FFC22060) hue-rotate(0deg); }
    100% { filter: drop-shadow(0 0 8px #FFC22060) hue-rotate(30deg); }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-i020); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--neutral-i030); }
</style>
</head>
<body>
<div id="root"></div>

<!-- Load order matters: content → game (strings+formatNum) → cloud → components → gate → app -->
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="game.jsx"></script>
<script type="text/babel" src="cloud.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="gate.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>
</body>
</html>
